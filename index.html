<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <!--font linking-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <link rel="stylesheet" href="style.css" media="all">
  <script src="app.js" defer></script>
  <title>Testemonials Grid</title>
</head>
<body>
    <template id="tm-card-temp">
	<article class="card">
	    <figure class="img-cont">
	        <img class="avatar" src="" alt="user profile image">
	        <figcaption class="bio-cont">
		    <h5 class="user-name"></h5>
		    <h6 class="user-title"></h6>
		</figcaption>
	    </figure>
	    <h2 class="t-header barlow-semi-condensed-600"></h2>
	    <p class="t-text"></p>
	</article>
    </template>
    <div id="tm-container"></div>
</body>
</html>
